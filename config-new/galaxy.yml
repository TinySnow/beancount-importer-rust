name: "银河证券"
mapping_file: "src/mapping/yinhe.yml"

# 必填核心账户
# - default_asset_account: 证券持仓账户
# - default_cash_account: 券商资金账户
# - default_expense_account/default_income_account: 费用与收益兜底账户
default_asset_account: "Assets:Invest-投资:证券:银河证券:证券资产"
default_cash_account: "Assets:Invest-投资:证券:银河证券:人民币资产"
default_expense_account: "Expenses:Finance-金融:证券交易费用"
default_income_account: "Income:Finance-金融:收益:银河证券"
default_repo_interest_account: "Income:Finance-金融:收益:银河证券:逆回购利息"
default_currency: "CNY"

# 可选扩展账户（不配置也可运行）
default_rounding_account: "Expenses:尾差"

# 可选：跨账期 lot 预加载文件（用于拆分本期 `{} @` 卖出，减少二义性）
# 路径可写相对路径（相对当前配置文件目录）或绝对路径。
# 例如你本地可配置为：
# inventory_seed_files:
#   - "C:/Users/TinySnow/Desktop/Beancount/transactions/2025/12/galaxy.bean"
inventory_seed_files: []

output:
  date_format: "%Y-%m-%d"
  decimal_places: 4
  emit_open_directives: true
  booking_method: "FIFO"

csv_options:
  delimiter: "\t"
  flexible: true
  encoding: "GBK"

skip_header_lines: 0
has_csv_header: true

rules:
  - name: "ignore-designated-trade"
    conditions:
      - field: "transaction_type"
        equals: "指定交易"
    action:
      ignore: true
    priority: 10

  - name: "ignore-share-transfer-in"
    conditions:
      - field: "transaction_type"
        equals: "股份转入"
    action:
      ignore: true
    priority: 11
