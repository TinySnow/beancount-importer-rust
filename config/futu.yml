name: "富途"
mapping_file: "mapping/futu.yml"

default_asset_account: "Assets:Broker:Futu:Securities"
default_expense_account: "Expenses:Investing:Fees"
default_income_account: "Income:Investing:Capital-Gains"
default_currency: "USD"

# 证券场景扩展账户（可被规则逐条覆盖，非必填）
securities_accounts:
  cash_account: "Assets:Broker:Futu:Cash"
  fee_account: "Expenses:Broker:Futu:Fee"
  pnl_account: "Income:Broker:Futu:PnL"
  rounding_account: "Expenses:Broker:Futu:Rounding"
  repo_interest_account: "Income:Investing:Interest"

csv_options:
  delimiter: ","
  flexible: true
  encoding: "auto"

skip_header_lines: 0
has_csv_header: true

output:
  date_format: "%Y-%m-%d"
  decimal_places: 4
  booking_method: "FIFO"

rules: []




